name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found."
            exit 1
          fi
          echo "index.html found."

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          sed -i 's|<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>|<!-- JSZip removed -->|' www/index.html
          sed -i 's|<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>|<!-- FileSaver removed -->|' www/index.html
          sed -i 's|exportGame|alert("导出请用网页版");//|' www/index.html
          echo '{"appId":"com.lumilo.engine","appName":"Lumilo","webDir":"www"}' > capacitor.config.json

      - name: Initialize Capacitor and add Android
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force landscape orientation
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("android/app/src/main/AndroidManifest.xml")
          root = tree.getroot()
          ns = "http://schemas.android.com/apk/res/android"
          ET.register_namespace("android", ns)
          for activity in root.iter("activity"):
              if activity.find(".//action") is not None:
                  activity.set(f"{{{ns}}}screenOrientation", "landscape")
                  print("Landscape set on activity:", activity.get(f"{{{ns}}}name"))
                  break
          tree.write("android/app/src/main/AndroidManifest.xml",
                     xml_declaration=True, encoding="utf-8")
          print("AndroidManifest.xml updated.")
          PYEOF

      - name: Replace icon (PNG only)
        run: |
          if [ -f icon.png ]; then
            for f in $(find android/app/src/main/res -name "ic_launcher*.png"); do
              cp icon.png "$f"
              echo "Replaced $f"
            done
            echo "Icon replaced."
          else
            echo "No icon.png found."
          fi

      - name: Ensure SDK components
        run: |
          if $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed | grep -q "platforms;android-34"; then
            echo "SDK ready."
          else
            { echo y; echo y; echo y; echo y; echo y; echo y; } | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: lumilo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
