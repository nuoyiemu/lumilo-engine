name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
          accept-license: true

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Create Capacitor project
        run: |
          mkdir app && cd app
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "织光" com.lumilo.engine --web-dir ../
          cp ../index.html ./index.html

      - name: Add Android platform
        run: cd app && npx cap add android

      - name: Build APK
        run: |
          cd app
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lumilo-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
