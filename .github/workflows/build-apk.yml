name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.2 platform-tools'
          accept-license: true

      - name: Set environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create app com.lumilo.engine "织光"
          cp index.html app/www/

      - name: Add Android platform
        run: cd app && cordova platform add android@12.0.0

      - name: Build APK (verbose)
        run: cd app && cordova build android --debug --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: lumilo-apk
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
