name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Prepare web assets and Capacitor config
        run: |
          mkdir -p www
          cp index.html www/
          echo '{"appId":"com.lumilo.engine","appName":"Lumilo","webDir":"www"}' > capacitor.config.json

      - name: Initialize Capacitor project and add Android platform
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android

      - name: Embed CDN scripts and native bridge
        run: |
          python3 - << 'PYEOF'
          import urllib.request

          jszip_code = urllib.request.urlopen(
              "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
          ).read().decode('utf-8')
          filesaver_code = urllib.request.urlopen(
              "https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"
          ).read().decode('utf-8')

          with open("www/index.html", "r", encoding="utf-8") as f:
              html = f.read()

          html = html.replace(
              '<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>',
              f'<script>{jszip_code}</script>'
          ).replace(
              '<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>',
              f'<script>{filesaver_code}</script>'
          )

          bridge = """
          <script>
          function saveFileLocally(content, filename) {
              if (window.Android && window.Android.saveFile) {
                  var reader = new FileReader();
                  reader.onload = function() {
                      window.Android.saveFile(reader.result, filename);
                  };
                  reader.readAsDataURL(content);
              } else {
                  saveAs(content, filename);
              }
          }
          window.originalSaveAs = saveAs;
          saveAs = saveFileLocally;
          </script>
          """
          html = html.replace("</head>", bridge + "</head>")

          with open("www/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("CDN embedded and native bridge injected.")
          PYEOF

      - name: Sync Capacitor (generates all native files and copies web assets)
        run: npx cap sync android

      # ---------- 强制横屏（sync 之后修改，避免被覆盖）----------
      - name: Force landscape orientation
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("android/app/src/main/AndroidManifest.xml")
          root = tree.getroot()
          ns = "http://schemas.android.com/apk/res/android"
          ET.register_namespace("android", ns)

          for activity in root.iter("activity"):
              if activity.find(".//action") is not None:
                  activity.set(f"{{{ns}}}screenOrientation", "landscape")
                  print("Landscape set on activity:", activity.get(f"{{{ns}}}name"))
                  break
          tree.write("android/app/src/main/AndroidManifest.xml",
                     xml_declaration=True, encoding="utf-8")
          print("AndroidManifest.xml updated.")
          PYEOF

      # ---------- 图标替换 ----------
      - name: Replace app icon (PNG only)
        run: |
          if [ -f icon.png ]; then
            for f in $(find android/app/src/main/res -name "ic_launcher*.png"); do
              cp icon.png "$f"
              echo "Replaced $f"
            done
            echo "Icon replaced."
          else
            echo "No icon.png found, using default."
          fi

      # ---------- 构建 ----------
      - name: Ensure Android SDK components
        run: |
          if $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed | grep -q "platforms;android-34"; then
            echo "SDK ready."
          else
            { echo y; echo y; echo y; echo y; echo y; echo y; } | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: lumilo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
