name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/

      - name: Initialize Capacitor project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo '{"appId":"com.lumilo.engine","appName":"Lumilo","webDir":"www"}' > capacitor.config.json
          npx cap add android

      - name: Create mandatory files and sync
        run: |
          mkdir -p android/app/src/main/assets
          echo '{}' > android/app/src/main/assets/capacitor.plugins.json
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          npx cap sync android

      # ---------- 修复1：强制横屏 ----------
      - name: Set screen orientation to landscape
        run: |
          sed -i 's/<activity /<activity android:screenOrientation="landscape" /' android/app/src/main/AndroidManifest.xml

      # ---------- 修复2：替换图标 ----------
      - name: Replace app icon
        run: |
          if [ -f icon.png ]; then
            cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "Icon replaced."
          else
            echo "No icon.png found, using default."
          fi

      # ---------- 修复3：内嵌 CDN 脚本，使导出功能离线可用 ----------
      - name: Embed CDN scripts using Python
        run: |
          python3 - << 'PYEOF'
          import re

          # 读取 HTML 文件
          with open("www/index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # 内嵌 JSZip
          jszip_url = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
          jszip_code = __import__('urllib.request').request.urlopen(jszip_url).read().decode('utf-8')
          html = html.replace(
              f'<script src="{jszip_url}"></script>',
              f'<script>{jszip_code}</script>'
          )

          # 内嵌 FileSaver
          filesaver_url = "https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"
          filesaver_code = __import__('urllib.request').request.urlopen(filesaver_url).read().decode('utf-8')
          html = html.replace(
              f'<script src="{filesaver_url}"></script>',
              f'<script>{filesaver_code}</script>'
          )

          # 写回文件
          with open("www/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print("CDN scripts embedded successfully.")
          PYEOF

      - name: Sync Capacitor after modifications
        run: npx cap sync android

      # ---------- 构建 APK ----------
      - name: Ensure Android SDK components
        run: |
          INSTALLED=$($ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed)
          if echo "$INSTALLED" | grep -q "platforms;android-34" && echo "$INSTALLED" | grep -q "build-tools;34.0.0"; then
            echo "Required SDK components already installed."
          else
            echo "Installing required components..."
            { echo y; echo y; echo y; echo y; echo y; echo y; } | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: lumilo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
