name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/

      - name: Initialize Capacitor project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo '{"appId":"com.lumilo.engine","appName":"Lumilo","webDir":"www"}' > capacitor.config.json
          npx cap add android

      - name: Create mandatory files and sync
        run: |
          mkdir -p android/app/src/main/assets
          echo '{}' > android/app/src/main/assets/capacitor.plugins.json
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          npx cap sync android

      # ---------- 内嵌 CDN 脚本 ----------
      - name: Embed CDN scripts
        run: |
          python3 - << 'PYEOF'
          import urllib.request

          with open("www/index.html", "r", encoding="utf-8") as f:
              html = f.read()

          jszip_url = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
          filesaver_url = "https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"

          jszip_code = urllib.request.urlopen(jszip_url).read().decode('utf-8')
          filesaver_code = urllib.request.urlopen(filesaver_url).read().decode('utf-8')

          old_jszip = f'<script src="{jszip_url}"></script>'
          old_filesaver = f'<script src="{filesaver_url}"></script>'
          new_jszip = f'<script>{jszip_code}</script>'
          new_filesaver = f'<script>{filesaver_code}</script>'

          html = html.replace(old_jszip, new_jszip).replace(old_filesaver, new_filesaver)

          with open("www/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("CDN scripts embedded.")
          PYEOF

      - name: Sync Capacitor
        run: npx cap sync android

      # ---------- 修复1：横屏 ----------
      - name: Force landscape orientation
        run: |
          # 找到 MainActivity.java 文件
          MAJAVA=$(find android -name "MainActivity.java" | head -1)
          # 在 setContentView 之前插入横屏代码
          sed -i '/setContentView/i\        setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);' "$MAJAVA"
          # 添加 import
          sed -i '/^import android.os.Bundle;/a import android.content.pm.ActivityInfo;' "$MAJAVA"
          echo "Landscape orientation set."

      # ---------- 修复2：图标 ----------
      - name: Replace icon (PNG only)
        run: |
          if [ -f icon.png ]; then
            for f in $(find android -name "ic_launcher*.png"); do
              cp icon.png "$f"
            done
            echo "Icon replaced."
          else
            echo "No icon.png found."
          fi

      # ---------- 构建 ----------
      - name: Ensure SDK components
        run: |
          if $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed | grep -q "platforms;android-34"; then
            echo "SDK ready."
          else
            { echo y; echo y; echo y; echo y; echo y; echo y; } | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: lumilo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
