name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
          accept-license: true

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Initialize Capacitor project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # 创建配置文件，明确 webDir 为当前目录
          echo '{"appId":"com.lumilo.engine","appName":"织光","webDir":"."}' > capacitor.config.json
          npx cap add android
          # 创建 android assets 目录并放入空插件清单（避免 sync 报错）
          mkdir -p android/app/src/main/assets
          echo '{}' > android/app/src/main/assets/capacitor.plugins.json
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lumilo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
