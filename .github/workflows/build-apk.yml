name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: Prepare web assets
        run: |
          mkdir -p www
          # 复制仓库中的 index.html 到 www
          cp index.html www/

      - name: Initialize Capacitor project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          echo '{"appId":"com.lumilo.engine","appName":"Lumilo","webDir":"www"}' > capacitor.config.json
          npx cap add android

      - name: Create mandatory files and sync
        run: |
          mkdir -p android/app/src/main/assets
          echo '{}' > android/app/src/main/assets/capacitor.plugins.json
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          npx cap sync android

      # ---------- 修复1：强制横屏 ----------
      - name: Set screen orientation to landscape
        run: |
          sed -i 's/<activity /<activity android:screenOrientation="landscape" /' android/app/src/main/AndroidManifest.xml

      # ---------- 修复2：替换图标 ----------
      - name: Replace app icon
        run: |
          if [ -f icon.png ]; then
            # 覆盖默认图标（多种分辨率）
            cp icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "Icon replaced."
          else
            echo "No icon.png found in repository root, using default icon."
          fi

      # ---------- 修复3：解决点击无反应（内嵌 CDN 资源） ----------
      - name: Embed CDN scripts for offline use
        run: |
          # 下载 JSZip 和 FileSaver 的内容并内嵌到 index.html 中
          JZIP=$(curl -sL https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js)
          FSAVER=$(curl -sL https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js)
          # 将 <script src="..."> 标签替换为内嵌脚本，移除 src 属性，把脚本内容直接放进去
          sed -i "s|<script src=\"https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js\"></script>|<script>${JZIP}</script>|" www/index.html
          sed -i "s|<script src=\"https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js\"></script>|<script>${FSAVER}</script>|" www/index.html
          echo "CDN scripts embedded."

      - name: Sync Capacitor after modifications
        run: npx cap sync android

      # ---------- 构建 APK ----------
      - name: Ensure Android SDK components
        run: |
          INSTALLED=$($ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed)
          if echo "$INSTALLED" | grep -q "platforms;android-34" && echo "$INSTALLED" | grep -q "build-tools;34.0.0"; then
            echo "Required SDK components already installed."
          else
            echo "Installing required components..."
            { echo y; echo y; echo y; echo y; echo y; echo y; } | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: lumilo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
